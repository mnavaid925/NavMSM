{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if alert %}Edit{% else %}Raise{% endif %} Andon Alert{% endblock %}

{% block content %}
<div class="page-title d-flex justify-content-between align-items-center">
    <h4>{% if alert %}Edit Alert{% else %}Raise Andon Alert{% endif %}</h4>
    <a href="{% url 'mes:andon_list' %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back</a>
</div>

<div class="card"><div class="card-body">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-danger"><i class="ri-alarm-warning-line me-1"></i> {% if alert %}Save{% else %}Raise Alert{% endif %}</button>
            <a href="{% url 'mes:andon_list' %}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</div></div>
{% endblock %}
