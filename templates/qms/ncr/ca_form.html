{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit Corrective Action{% endblock %}

{% block content %}
<div class="page-title d-flex justify-content-between align-items-center">
    <h4>Edit Corrective Action - {{ ncr.ncr_number }}</h4>
    <a href="{% url 'qms:ncr_detail' ncr.pk %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back to NCR</a>
</div>
<div class="card"><div class="card-body">
<form method="post">{% csrf_token %}{{ form|crispy }}
<div class="d-flex gap-2"><button class="btn btn-primary"><i class="ri-save-line me-1"></i> Save</button>
<a href="{% url 'qms:ncr_detail' ncr.pk %}" class="btn btn-light">Cancel</a></div>
</form>
</div></div>
{% endblock %}
