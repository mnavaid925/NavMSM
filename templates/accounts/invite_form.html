{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Send Invite{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h4>Send User Invitation</h4>
        <div class="text-muted small">They'll receive a link to set a password and join your tenant.</div>
    </div>
    <a href="{% url 'accounts:invite_list' %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" class="col-lg-6">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-primary"><i class="ri-mail-send-line me-1"></i> Send Invitation</button>
                <a href="{% url 'accounts:invite_list' %}" class="btn btn-light">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
