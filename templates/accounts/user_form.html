{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-title">
    <div>
        <h4>{{ title }}</h4>
        <div class="text-muted small">Fill in the details and save.</div>
    </div>
    <a href="{% url 'accounts:user_list' %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-primary"><i class="ri-save-line me-1"></i> Save</button>
                <a href="{% url 'accounts:user_list' %}" class="btn btn-light">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
