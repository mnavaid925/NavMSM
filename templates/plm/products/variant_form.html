{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit Variant{% endblock %}

{% block content %}
<div class="page-title d-flex justify-content-between align-items-center">
    <h4>Edit Variant — {{ variant.variant_sku }}</h4>
    <a href="{% url 'plm:product_detail' variant.product_id %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back to product</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary"><i class="ri-save-line me-1"></i> Save</button>
                <a href="{% url 'plm:product_detail' variant.product_id %}" class="btn btn-light">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
