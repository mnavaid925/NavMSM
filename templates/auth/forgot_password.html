{% extends 'auth/auth_base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block form %}
<h1 class="form-title">Forgot your password?</h1>
<p class="form-subtitle">Enter your email and we'll send a reset link.</p>

<form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required autofocus value="{{ form.email.value|default:'' }}">
        {% if form.email.errors %}<div class="text-danger small mt-1">{{ form.email.errors|first }}</div>{% endif %}
    </div>
    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
</form>

<div class="text-center mt-4 small">
    Remembered it? <a href="{% url 'accounts:login' %}">Sign in</a>
</div>
{% endblock %}
