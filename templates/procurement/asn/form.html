{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if is_create %}New ASN{% else %}Edit ASN{% endif %}{% endblock %}

{% block content %}
<div class="page-title d-flex justify-content-between align-items-center">
    <h4>{% if is_create %}New Advance Shipping Notice{% else %}Edit ASN{% endif %}</h4>
    <a href="{% url 'procurement:asn_list' %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back</a>
</div>
<div class="card"><div class="card-body">
<form method="post">{% csrf_token %}{{ form|crispy }}
<div class="d-flex gap-2"><button class="btn btn-primary"><i class="ri-save-line me-1"></i> Save</button>
<a href="{% url 'procurement:asn_list' %}" class="btn btn-light">Cancel</a></div>
</form></div></div>
{% endblock %}
