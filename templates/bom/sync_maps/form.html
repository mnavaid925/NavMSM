{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if sync_map %}Edit{% else %}New{% endif %} Sync Map{% endblock %}

{% block content %}
<div class="page-title d-flex justify-content-between align-items-center">
    <h4>{% if sync_map %}Edit Sync Map{% else %}New Sync Map{% endif %}</h4>
    <a href="{% url 'bom:sync_list' %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back to list</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary"><i class="ri-save-line me-1"></i> Save</button>
                <a href="{% url 'bom:sync_list' %}" class="btn btn-light">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
