{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}New Cycle Count Sheet{% endblock %}

{% block content %}
<div class="page-title d-flex justify-content-between align-items-center">
    <h4>Create Cycle Count Sheet</h4>
    <a href="{% url 'inventory:cc_sheet_list' %}" class="btn btn-light"><i class="ri-arrow-left-line me-1"></i> Back</a>
</div>
<div class="card"><div class="card-body">
<form method="post">{% csrf_token %}{{ form|crispy }}
<div class="d-flex gap-2"><button class="btn btn-primary"><i class="ri-save-line me-1"></i> Save &amp; Add Lines</button>
<a href="{% url 'inventory:cc_sheet_list' %}" class="btn btn-light">Cancel</a></div>
</form></div></div>
{% endblock %}
